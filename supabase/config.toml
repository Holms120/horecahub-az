# Edge function auth settings.
# verify_jwt = true  → the API gateway requires a valid project JWT
#                      (the anon key qualifies) before the function runs.
# Functions that also enforce their own admin/JWT checks keep verify_jwt
# on as a first line of defence.

[functions.delete-user]
enabled = true
verify_jwt = true          # + in-function admin check (see index.ts)

[functions.send-rejection-email]
enabled = true
verify_jwt = true          # + in-function admin check (see index.ts)

[functions.notify-telegram]
enabled = true
verify_jwt = true          # was false — now requires the project JWT
import_map = "./functions/notify-telegram/deno.json"
entrypoint = "./functions/notify-telegram/index.ts"

[functions.send-confirmation-email]
enabled = true
verify_jwt = false         # Supabase Auth email hook: authenticated via
                           # SEND_CONFIRMATION_HOOK_SECRET, not a JWT.

[functions.support-ai]
enabled = true
verify_jwt = true          # anon key qualifies; in-function anon rate limit

[functions.notify-message-email]
enabled = true
verify_jwt = true          # + in-function check: caller must be the sender
